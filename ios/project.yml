# XcodeGen spec for the native iOS app (iOS roadmap, monorepo `ios/` per D1).
#
# This file is the source of truth for the project structure; the committed
# BlackjackTrainer.xcodeproj is generated from it (`cd ios && xcodegen generate`).
# The generated project is committed so `xcodebuild` and CI need no extra tools.
name: BlackjackTrainer
options:
  bundleIdPrefix: com.arthurzhang.blackjacktrainer
  deploymentTarget:
    iOS: '17.0' # D3: minimum iOS 17
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: '5.0'
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: 'NO'
    CODE_SIGNING_ALLOWED: 'NO'
    DEVELOPMENT_TEAM: C3W798H8U8
targets:
  BlackjackTrainer:
    type: application
    platform: iOS
    sources:
      - path: BlackjackTrainer
      # Types shared with the widget extension (the stats snapshot model).
      - path: Shared
      # The app loads these two data files at runtime (the exported source of
      # truth per D2). The large vector fixtures are test-only.
      - path: Fixtures/charts.json
        buildPhase: resources
      - path: Fixtures/counting-systems.json
        buildPhase: resources
    dependencies:
      # Embeds the widget extension into the app bundle (4.3).
      - target: BlackjackWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arthurzhang.blackjacktrainer.app
        PRODUCT_NAME: BlackjackTrainer
        # iCloud KVS entitlement (4.2). Inert with code signing disabled (the
        # simulator build stays green); the human enables the iCloud capability
        # for the App ID and signs to activate cross-device sync.
        CODE_SIGN_ENTITLEMENTS: BlackjackTrainer/BlackjackTrainer.entitlements
        GENERATE_INFOPLIST_FILE: 'YES'
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
        # Export compliance (Slice 5.1): the app uses no non-exempt encryption,
        # so declare it up front and skip the per-upload prompt. See
        # docs/app-store-submission.md.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: 'NO'
        TARGETED_DEVICE_FAMILY: '1,2'
        INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: 'YES'
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon # app icon set added in 4.1
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark # dark color scheme (mirrors the web)
        INFOPLIST_KEY_CFBundleDisplayName: Blackjack Trainer
        INFOPLIST_KEY_UISupportedInterfaceOrientations: 'UIInterfaceOrientationPortrait'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: 'UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
  BlackjackWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: BlackjackWidget
      # The shared stats-snapshot model is compiled into the widget too, so it
      # reads exactly the shape the app writes.
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arthurzhang.blackjacktrainer.app.widget
        PRODUCT_NAME: BlackjackWidget
        # App Group entitlement (4.3). Inert with code signing disabled (the
        # simulator build stays green); the human enables the group for both App
        # IDs and signs to activate cross-process stats sharing.
        CODE_SIGN_ENTITLEMENTS: BlackjackWidget/BlackjackWidget.entitlements
        # An explicit Info.plist carries the WidgetKit extension point; the rest
        # of the bundle keys are generated and merged in (Xcode template style).
        GENERATE_INFOPLIST_FILE: 'YES'
        INFOPLIST_FILE: BlackjackWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Blackjack Trainer
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
  BlackjackTrainerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlackjackTrainerTests
      # Bundle the exported parity fixtures (flattened into the bundle root) so
      # the parity tests can load them as resources.
      - path: Fixtures
        buildPhase: resources
    dependencies:
      - target: BlackjackTrainer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arthurzhang.blackjacktrainer.tests
        GENERATE_INFOPLIST_FILE: 'YES'
schemes:
  BlackjackTrainer:
    build:
      targets:
        BlackjackTrainer: all
        BlackjackTrainerTests: [test]
    test:
      targets:
        - BlackjackTrainerTests
