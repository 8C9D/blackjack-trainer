# XcodeGen spec for the native iOS app (iOS roadmap, monorepo `ios/` per D1).
#
# This file is the source of truth for the project structure; the committed
# BlackjackTrainer.xcodeproj is generated from it (`cd ios && xcodegen generate`).
# The generated project is committed so `xcodebuild` and CI need no extra tools.
name: BlackjackTrainer
options:
  bundleIdPrefix: com.blackjacktrainer
  deploymentTarget:
    iOS: '17.0' # D3: minimum iOS 17
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: '5.0'
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: 'NO'
    CODE_SIGNING_ALLOWED: 'NO'
    DEVELOPMENT_TEAM: ''
targets:
  BlackjackTrainer:
    type: application
    platform: iOS
    sources:
      - path: BlackjackTrainer
      # The app loads these two data files at runtime (the exported source of
      # truth per D2). The large vector fixtures are test-only.
      - path: Fixtures/charts.json
        buildPhase: resources
      - path: Fixtures/counting-systems.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blackjacktrainer.app
        PRODUCT_NAME: BlackjackTrainer
        GENERATE_INFOPLIST_FILE: 'YES'
        MARKETING_VERSION: '1.0'
        CURRENT_PROJECT_VERSION: '1'
        TARGETED_DEVICE_FAMILY: '1,2'
        INFOPLIST_KEY_UILaunchScreen_Generation: 'YES'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: 'YES'
        # The card-art asset catalog (2.3) is the first catalog; the app icon set
        # arrives in Slice 4.1, so don't require an AppIcon yet.
        ASSETCATALOG_COMPILER_APPICON_NAME: ''
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark # dark color scheme (mirrors the web)
        INFOPLIST_KEY_CFBundleDisplayName: Blackjack Trainer
        INFOPLIST_KEY_UISupportedInterfaceOrientations: 'UIInterfaceOrientationPortrait'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: 'UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
  BlackjackTrainerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlackjackTrainerTests
      # Bundle the exported parity fixtures (flattened into the bundle root) so
      # the parity tests can load them as resources.
      - path: Fixtures
        buildPhase: resources
    dependencies:
      - target: BlackjackTrainer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blackjacktrainer.tests
        GENERATE_INFOPLIST_FILE: 'YES'
schemes:
  BlackjackTrainer:
    build:
      targets:
        BlackjackTrainer: all
        BlackjackTrainerTests: [test]
    test:
      targets:
        - BlackjackTrainerTests
