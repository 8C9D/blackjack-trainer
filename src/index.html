<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Blackjack Trainer</title>
  <base href="/">

  <!-- Mobile viewport: device-width + viewport-fit=cover so the layout can use
       env(safe-area-inset-*) under notches / the iOS home indicator. Zoom is
       intentionally left enabled for accessibility. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Practice blackjack basic strategy, Hi-Lo card counting, true count, and deviations. Frontend-only trainer with per-session stats.">
  <meta name="color-scheme" content="dark">

  <!-- Browser/OS chrome theming + PWA-ready basics. -->
  <meta name="theme-color" content="#0a3a22">
  <link rel="manifest" href="manifest.webmanifest">

  <!-- iOS standalone ("Add to Home Screen") hints. -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Blackjack Trainer">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
